<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Global Natural Disaster Atlas</title>

  <!-- Leaflet CSS (local) -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Viewport height fix for mobile browser chrome -->
  <script>
    (function() {
      function setVh() {
        document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
      }
      setVh();
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', function() { setTimeout(setVh, 150); });
    })();
  </script>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading disaster data…</div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Header -->
  <div id="header" class="glass-panel">
    <h1><span>●</span> Global Natural Disaster Atlas</h1>
    <span id="event-counter">0 events visible</span>
  </div>

  <!-- Search -->
  <div id="search-container">
    <span id="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search events, countries, years…" autocomplete="off">
    <div id="search-results" class="glass-panel"></div>
  </div>

  <!-- Filter Panel -->
  <button id="filter-toggle" class="glass-panel">☰ Filters</button>
  <div id="filter-panel" class="glass-panel"></div>

  <!-- Timeline -->
  <div id="timeline-panel" class="glass-panel">
    <div id="playback-controls">
      <button class="playback-btn" id="btn-play" title="Play timeline">▶</button>
    </div>
    <span class="timeline-label">Past</span>
    <input type="range" id="timeline-slider" min="1" max="50" value="50" step="1">
    <span class="timeline-label" id="slider-years-label">50 years</span>
    <span class="timeline-dash">|</span>
    <span class="timeline-range-display" id="timeline-range-display"></span>
  </div>

  <!-- Legend -->
  <div id="legend-panel" class="glass-panel">
    <div class="legend-title">Legend</div>
    <div class="legend-items" id="legend-items"></div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="toolbar-btn glass-panel" id="btn-fit" title="Fit map to visible events">⊞</button>
    <button class="toolbar-btn glass-panel" id="btn-theme" title="Toggle map theme">🗺</button>
    <button class="toolbar-btn glass-panel" id="btn-export" title="Export filtered data">⬇</button>
  </div>

  <!-- Scripts (order matters: data → map → ui → app) -->
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
